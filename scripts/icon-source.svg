<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d48e"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="126" y="200" width="260" height="180" rx="28" fill="none" stroke="url(#gold)" stroke-width="14"/>
  <!-- Camera lens -->
  <circle cx="256" cy="290" r="55" fill="none" stroke="url(#gold)" stroke-width="14"/>
  <circle cx="256" cy="290" r="28" fill="url(#gold)" opacity="0.3"/>
  <!-- Camera top (viewfinder bump) -->
  <rect x="200" y="172" width="80" height="40" rx="10" fill="none" stroke="url(#gold)" stroke-width="12"/>
  <!-- Flash dot -->
  <circle cx="340" cy="232" r="10" fill="url(#gold)"/>
  <!-- Sparkle star top-right -->
  <g transform="translate(390, 140)" fill="url(#gold)">
    <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(140, 155) scale(0.5)" fill="url(#gold)">
    <path d="M0,-18 L4,-4 L18,0 L4,4 L0,18 L-4,4 L-18,0 L-4,-4 Z"/>
  </g>
  <!-- Text "oA" -->
  <text x="256" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="url(#gold)" letter-spacing="2">ourAlbum</text>
</svg>
