<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d48b"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a8872a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Art deco border -->
  <rect x="24" y="24" width="464" height="464" rx="60" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <rect x="36" y="36" width="440" height="440" rx="52" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <!-- Corner accents -->
  <circle cx="56" cy="56" r="4" fill="url(#gold)" opacity="0.5"/>
  <circle cx="456" cy="56" r="4" fill="url(#gold)" opacity="0.5"/>
  <circle cx="56" cy="456" r="4" fill="url(#gold)" opacity="0.5"/>
  <circle cx="456" cy="456" r="4" fill="url(#gold)" opacity="0.5"/>
  <!-- Art deco sunburst -->
  <g transform="translate(256, 200)" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.3">
    <line x1="0" y1="-80" x2="0" y2="-110"/>
    <line x1="40" y1="-69" x2="55" y2="-95" />
    <line x1="69" y1="-40" x2="95" y2="-55" />
    <line x1="80" y1="0" x2="110" y2="0"/>
    <line x1="-40" y1="-69" x2="-55" y2="-95" />
    <line x1="-69" y1="-40" x2="-95" y2="-55" />
    <line x1="-80" y1="0" x2="-110" y2="0"/>
    <line x1="20" y1="-77" x2="28" y2="-106"/>
    <line x1="-20" y1="-77" x2="-28" y2="-106"/>
    <line x1="57" y1="-57" x2="78" y2="-78"/>
    <line x1="-57" y1="-57" x2="-78" y2="-78"/>
  </g>
  <!-- Camera body -->
  <rect x="156" y="200" width="200" height="140" rx="16" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <!-- Camera lens -->
  <circle cx="256" cy="270" r="42" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <circle cx="256" cy="270" r="22" fill="url(#gold)" opacity="0.2"/>
  <circle cx="256" cy="270" r="8" fill="url(#gold)" opacity="0.4"/>
  <!-- Camera top -->
  <rect x="220" y="178" width="60" height="30" rx="6" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <!-- Flash -->
  <circle cx="320" cy="228" r="7" fill="url(#gold)" opacity="0.6"/>
  <!-- Art deco sparkle -->
  <g transform="translate(370, 150)" fill="url(#gold)" opacity="0.5">
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z"/>
  </g>
  <g transform="translate(150, 165) scale(0.6)" fill="url(#gold)" opacity="0.4">
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z"/>
  </g>
  <!-- V&I text -->
  <text x="256" y="410" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="52" fill="url(#gold)" letter-spacing="6">V &amp; I</text>
  <!-- Underline -->
  <line x1="180" y1="425" x2="332" y2="425" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
</svg>
